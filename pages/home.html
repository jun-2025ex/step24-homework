<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じぶん管理</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <div class="record-wrapper flex flex-col gap-5 h-full">
      <h2 class="text-xl font-bold">ホーム</h2>

        <div class="grid flex-1 grid grid-cols-2 grid-rows-2 gap-5 min-h-0">
            <div class="card bg-white p-5 rounded-[10px] shadow-md flex flex-col min-h-0">
                <h3 class="font-bold">食事</h3>
                <div class="chart-container flex-1 relative min-h-0">
                    <canvas id="foodChart" class="fabsolute inset-0 lex-1 w-full h-full block"></canvas>
                </div>
            </div>

            <div class="card bg-white p-5 rounded-[10px] shadow-md flex flex-col min-h-0">
                <h3 class="font-bold">睡眠</h3>
                <div class="chart-container flex-1 relative min-h-0">
                    <canvas id="sleepChart" class="fabsolute inset-0 lex-1 w-full h-full block"></canvas>
                </div>
            </div>

            <div class="card bg-white p-5 rounded-[10px] shadow-md flex flex-col min-h-0">
                <h3 class="font-bold">運動</h3>
                <div class="chart-container flex-1 relative min-h-0">
                    <canvas id="exerciseChart" class="fabsolute inset-0 lex-1 w-full h-full block"></canvas>
                </div>
            </div>

            <div class="card bg-white p-5 rounded-[10px] shadow-md flex flex-col min-h-0">
                <h3 class="font-bold">勉強</h3>
                <div class="chart-container flex-1 relative min-h-0">
                    <canvas id="studyChart" class="absolute inset-0 flex-1 w-full h-full block"></canvas>
                </div>
            </div>
        </div>
    </div>
  </body>
</html>
