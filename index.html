<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じぶん管理</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body class="flex font-sans">
    <div class="sidebar w-[200px] bg-[#A3E4E4] p-5 h-screen box-border">
      <h2 class="logo text-xl font-bold">じぶん管理</h2>

      <nav class="menu flex flex-col gap-2.5">
        <button class="menu-item active flex items-center gap-3 px-[14px] py-3 rounded-lg text-[15px] cursor-pointer transition" onclick="navigate('home')">
          <i class="fa-solid fa-chart-column"></i>
          ホーム
        </button>
        <button class="menu-item flex items-center gap-3 px-[14px] py-3 rounded-lg text-[15px] cursor-pointer transition" onclick="navigate('record')">
          <i class="fa-solid fa-align-justify"></i>
          記録
        </button>
      </nav>
    </div>

    <div class="main flex-1 h-screen p-[30px] box-border overflow-hidden flex flex-col" id="app"></div>

    <script src="app.js"></script>
    <script src="seeder.js"></script>
  </body>
</html>
